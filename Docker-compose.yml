version: "3.8"

services:

  pyspark:
    build: .
    container_name: pyspark-jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/workspace
    environment:
      - SPARK_MODE=local
      - TMPDIR=/tmp
      - SPARK_LOCAL_DIRS=/tmp
    stdin_open: true
    tty: true
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"